<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pikachu — Pure CSS Mascot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sky">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>

  <main class="scene">
    <h1 class="title">PIKACHU<span class="spark">⚡</span></h1>
    <p class="subtitle">100% CSS. No images. No SVG. Just div, span &amp; imagination.</p>

    <div class="stage">

      <div class="ground"></div>
      <div class="leaf leaf1"></div>
      <div class="leaf leaf2"></div>
      <div class="leaf leaf3"></div>

      <div class="pikachu">

        <!-- TAIL -->
        <div class="tail">
          <div class="bolt bolt1"></div>
          <div class="bolt bolt2"></div>
          <div class="bolt bolt3"></div>
          <div class="tail-base"></div>
        </div>

        <!-- BACK STRIPES -->
        <div class="stripe stripe-back-l"></div>
        <div class="stripe stripe-back-r"></div>

        <!-- ARMS -->
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>

        <!-- FEET -->
        <div class="foot foot-left"></div>
        <div class="foot foot-right"></div>

        <!-- BODY -->
        <div class="body">
          <div class="belly-shade"></div>
        </div>

        <!-- EARS -->
        <div class="ear ear-left">
          <div class="ear-tip"></div>
        </div>
        <div class="ear ear-right">
          <div class="ear-tip"></div>
        </div>

        <!-- HEAD -->
        <div class="head">
          <div class="cheek cheek-left"></div>
          <div class="cheek cheek-right"></div>

          <div class="eyebrow eyebrow-left"></div>
          <div class="eyebrow eyebrow-right"></div>

          <div class="eye eye-left">
            <div class="eye-shine"></div>
          </div>
          <div class="eye eye-right">
            <div class="eye-shine"></div>
          </div>

          <div class="nose"></div>
          <div class="mouth"></div>
        </div>

      </div>
    </div>

    <p class="caption">A hand-coded Pikachu, built entirely from &lt;div&gt; and &lt;span&gt; elements styled with border-radius, transform, box-shadow and absolute positioning.</p>
  </main>

</body>
</html>
